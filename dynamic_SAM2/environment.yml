name: ai_predictor_propagation
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - pillow>=10.0
  - matplotlib>=3.7
  - tqdm>=4.66
  - opencv>=4.8
  # Pick the right pytorch line based on your machine:
  #   CUDA GPU  ->  pytorch::pytorch-cuda=12.1
  #   Apple / CPU ->  pytorch::cpuonly
  - pytorch::pytorch>=2.3
  - pytorch::torchvision>=0.18
  - pip:
    - hydra-core>=1.3
    - omegaconf>=2.3,<2.4
    - iopath>=0.1.10
    - huggingface_hub>=0.24
    - ipympl>=0.9
    - jupyterlab>=4.0
    - notebook>=7.0
    - ipykernel>=6.25
